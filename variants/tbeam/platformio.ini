; The 1.0 release of the TBEAM board
[env:tbeam]
extends = esp32_base
board = ttgo-t-beam
board_check = true
lib_deps =
  ${esp32_base.lib_deps}

build_flags =
  ${esp32_base.build_flags} -D TBEAM_V10  -I variants/tbeam
  -DGPS_POWER_TOGGLE
  -D DEBUG_HEAP=1
  -D MESHTASTIC_EXCLUDE_PAXCOUNTER=1
  -D MESHTASTIC_EXCLUDE_REMOTEHARDWARE=1
;  -D MESHTASTIC_EXCLUDE_ADMIN=1
  -D MESHTASTIC_EXCLUDE_ATAK=1
  -D MESHTASTIC_EXCLUDE_CANNEDMESSAGES=1
  -D MESHTASTIC_EXCLUDE_DETECTIONSENSOR=1
  -D MESHTASTIC_EXCLUDE_NEIGHBORINFO=1
  -D MESHTASTIC_EXCLUDE_REMOTEHARDWARE=1
  -D MESHTASTIC_EXCLUDE_POWERSTRESS=1

upload_speed = 500000
