[env:picow]
extends = rp2040_base
board = rpipicow
board_level = extra

;upload_protocol = jlink
;debug_tool = jlink
;upload_speed = 4000
;debug_speed = 4000

upload_protocol = cmsis-dap
upload_speed = 30000

debug_tool = cmsis-dap
debug_speed = 30000

# add our variants files to the include and src paths
build_flags = ${rp2040_base.build_flags}
  -DRPI_PICO
  -Ivariants/rpipicow
  -DHW_SPI1_DEVICE
  -L "${platformio.libdeps_dir}/${this.__env__}/bsec2/src/cortex-m0plus"
  -fexceptions  # for exception handling in MQTT
  -DHAS_UDP_MULTICAST=1

  -D MESHTASTIC_EXCLUDE_PAXCOUNTER=1
  -D MESHTASTIC_EXCLUDE_REMOTEHARDWARE=1
;  -D MESHTASTIC_EXCLUDE_ADMIN=1
  -D MESHTASTIC_EXCLUDE_ATAK=1
  -D MESHTASTIC_EXCLUDE_CANNEDMESSAGES=1
  -D MESHTASTIC_EXCLUDE_DETECTIONSENSOR=1
  -D MESHTASTIC_EXCLUDE_NEIGHBORINFO=1
  -D MESHTASTIC_EXCLUDE_REMOTEHARDWARE=1
  -D MESHTASTIC_EXCLUDE_POWERSTRESS=1

build_src_filter = ${rp2040_base.build_src_filter} +<mesh/wifi/>
lib_deps =
  ${rp2040_base.lib_deps}
  ${networking_base.lib_deps}

debug_build_flags = ${rp2040_base.build_flags}, -g
